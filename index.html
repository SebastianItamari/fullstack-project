<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap');
    
      body {
        font-family: "Exo 2", sans-serif;
        padding: 30px;
        background-color: #1c2a39;
        color: #e6e9ef;
      }

      h1 {
        font-family: 'Luckiest Guy', cursive;
        font-weight: 100;
        color: #ffffff;
        margin-bottom: 20px;
      }

      input {
        padding: 10px 10px 12px 10px;
        width: 250px;
        border: 1px solid #3c4a57;
        border-radius: 6px;
        background-color: #2a3b4d;
        color: #e6e9ef;
      }

      input::placeholder {
        color: #9aa0a6;
      }

      button {
        padding: 10px 15px 12px 15px;
        margin-left: 10px;
        background-color: #3b82f6;
        color: #ffffff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      
      button:hover {
        background-color: #2563eb;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }

      li {
        background-color: #2a3b4d;
        color: #e6e9ef;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
        box-shadow: 0 2px 4px rgba(255, 255, 255, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 30%;
        min-width: 300px;
        height: auto;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      }

      li:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.25);
        background-color: #33475b;
      }

      li span {
        flex: 1;
        margin-right: 10px;
        overflow-wrap: break-word;
        word-break: break-word;
        white-space: normal;
      }

      input, button {
        font-family: inherit;
      }

      .delete-btn {
        margin-left: 10px;
        background-color: #ef4444;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        padding: 6px 12px 8px 12px;
      }

      .delete-btn:hover {
        background-color: #dc2626;
      }
    </style>
  </head>
  <body>
    <h1>Task Manager</h1>

    <input type="text" id="taskInput" placeholder="Escribe una nueva tarea"/>
    
    <button id="addTaskBtn">Agregar tarea</button>

    <ul id="taskList"></ul>

    <script>
      const input = document.querySelector('#taskInput');
      const button = document.querySelector('#addTaskBtn');
      const list = document.querySelector('#taskList');

      function createTaskItem(text) {
        const li = document.createElement('li');
        
        const span = document.createElement('span');
        span.textContent = text;

        const deleteBtn = document.createElement('button');
        deleteBtn.classList.add('delete-btn');
        deleteBtn.textContent = 'Eliminar';
        deleteBtn.addEventListener('click', () => {
          li.remove();
        });

        li.appendChild(span);
        li.appendChild(deleteBtn);
        return li;
      }

      const initialLi = createTaskItem('Estudiar JavaScript');
      list.appendChild(initialLi);

      button.addEventListener('click', () => {
        const taskText = input.value.trim();
        if (taskText) {
          const li = createTaskItem(taskText);
          list.appendChild(li);
          input.value = '';
        } else {
          alert('Ingresa una tarea válida por favor.');
        }
      });
    </script>
  </body>
</html>
